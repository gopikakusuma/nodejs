<!DOCTYPE html>
<html>
<head>
    <title>Register - E-Book Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" style="margin:0;">E-BOOK STORE</a>
        <div>
            <a href="index.html">Catalog</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container" style="max-width: 400px; margin: auto;">
        <div class="card">
            <h2>Create Account</h2>
            <form action="login.html">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <a href="login.html" style="color:blue">Login here</a></p>
        </div>
    </div>
</body>
</html>
